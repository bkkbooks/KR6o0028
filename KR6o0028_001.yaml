body:
  text: 商羯羅主菩薩造三藏法師玄奘譯西蜀沙門明昱疏將釋此論科文分四一釋題目二釋論主三釋譯師四釋論文且初釋題目因者格諸法之比量明者照諸法之正智非正智無以照諸法本因非比量無以格諸法自相是以據比量正智能入諸法正理也故論主以極成有法極成能別為宗遍是宗法為因顯因同品為喻豈非因明入正理乎蓋因者是比量義而有三支以三支比量為因名因言生智了為果名明趨進得本名入簡別偏邪名正諸法自相名理賓主較言名論故云因明入正理論斯乃觀察義中祕鍵關鑰權衡智畔妙轉靈樞詮論量之指歸敘折邪之軌式苟於一法因明入一法正理萬法因明入萬法正理正理既得正智昭然如是則能徹窮諸法源頭事事無礙豈易言哉但患見諦不親立量不真耳或謂斯典無宜於此方愚未能知也一釋題目竟下二釋論主商羯羅主菩薩造梵語商羯羅此云天主者唐言也譯師存梵兼唐為名故云天主菩薩者梵語從略若具足應云菩提薩埵菩提云覺薩埵云情以論主自既覺已復覺有情故以菩提薩埵稱之今從略唯名菩薩造者為也雖義祖先覺又從自製故云造也二釋論主竟下三釋譯師三藏法師玄奘譯三藏者經律論也經以貫理律以嚴戒論較是非簡別邪正法師俱善故以三藏稱之既善三藏為人所師復以法師為名耳三釋譯師竟下四釋論文分三一總標二通釋三結顯且初總標能立與能破及似唯悟他現量與比量及似唯自悟此頌一論之綱宗揭示八門二益之梗槩欲令學者知其要也能立者三支無過能破者正顯其非似能立者三十三種過隨之似能破者不定不成等謬斥現量者謂離名言所有分別比量者謂藉衆相而觀於義似現量者於義異轉似比量者不能正解唯悟他者以前四門俱是顯示益他之義故云悟他唯自悟者以後四門俱是自證自解境界故云自悟是以八門二益總該一論之旨矣如是總攝諸論要義結成頌中所詮該諸論之要義也一總標竟下二通釋分八一能立門二似能立門三現量門四比量門五似現量門六似比量門七能破門八似能破門一又分三一總標能立二別釋三支三結成立義且初總標能立此中宗等多言名為能立由宗因喻多言開示諸有問者未了義故謂此能立門中所詮宗因喻之多言無過名為能立問何用三支方為能立答由宗因喻多言方能開示諸有問者未了義故謂諸問者不了諸法本因於常無常等宗猶豫不決論主立三支比量使知因為宗法喻為明訓於無常等宗了然自決矣又宗因喻各有多理名為多言宗中多言有九一現量不相違二比量不相違三自教不相違四世間不相違五自語不相違六能別宗體極成七所別宗依極成八能所俱極成九無相符極成因中多言有三一能成二決定三不相違能成有四一兩俱能成立敵共許故二隨一能成敵者亦許故三決定能成無猶豫故四所依能成有有法故決定有六一決定非共因於異品無故二決定非不共因於同品有故三決定非同品一分轉異品遍轉四決定非異品一分轉唯許同品宜遍轉五決定非俱品一分轉六決定非相違不相違有四一因不相違法自相二因不相違法差別三因不相違有法自相四因不相違有法差別喻中多言有二一同喻二異喻一同喻有五一同喻能成因二同喻能成宗三宗因俱能成四三支配合辭五辭不顛倒合二異喻有五一異喻能遣宗二異喻能遣因三宗因俱能遣四三支配離辭五辭不顛倒離應知多言皆理為過則三十三過名似能立反過為理亦三十三理名真能立故龍樹云即此多言説名能立及似能立隨其所應為開悟他説此能立及似能立一總標能立竟下二別釋三支分三一釋宗二釋因三釋喻且初釋宗此中宗者謂極成有法極成能別差別性故隨自樂為所成立性是名為宗如有成立聲是無常法不孤起仗境方生凡所立宗須前陳一法為宗依法中無過故云極成有法推尋此法是真是妄常無常等立為宗旨以能辨別此法無謬故云極成能別後陳宗體既為能別則前陳宗依為所別也又宗者本也導也崇也立宗為本則導引衆義崇之故立無常為宗因喻亦宜無常立常為宗因喻亦宜為常是立宗無過故云極成能別也差別性故隨自樂為者謂前陳有法中有差別義隨自意樂取一義為宗如以玉為前陳有法成立宗依論玉之質為堅玉之色為白是為差別性於差別中立堅立白隨自樂為也所成立性是名為宗者釋成宗體也所成立者即宗之名對後因説名所成立以宗為所成由因為能成謂雖立宗其理未確必舉因成宗義方定故以因為能成立宗為所成立也復舉例云如立聲為前陳有法是無常為宗聲有生滅理必無常是為極成一釋宗竟下二釋因因有三相何等為三謂遍是宗法性同品定有性異品遍無性云何名為同品異品謂所立法均等義品説名同品如立無常瓶等無常是名同品異品者謂於是處無其所立若有是常見非所作如虗空等此中所作性或勤勇無間所發性遍是宗法於同品定有性異品遍無性是無常等因因是宗之法性故以宗法為因品是一切義名都以三支名品定有遍無俱顯因性因有三相者謂俱品同品異品也言遍是宗法性者是顯俱品義以同品之因唯遍同品之宗異品之因唯遍異品之宗名遍是宗法故龍樹以遍是宗法為俱品同品定有性異品遍無性者謂同品之因定有於異品中遍無以同品之因不轉異品是為無過云何下雙徵謂所下別釋言所立法者即是所成立之宗謂宗與因其義均平是同品義如立下舉例謂立無常為宗瓶等為喻以瓶等是無常義故是名同品者結成所立之宗同於瓶等喻也異品下別釋異品謂於是處無其所立者謂異品因處無同品所立之宗若有是常者謂異品處若有所立定是常法故立異品三支云是常為宗見非所作為因如虗空等喻以常宗異無常非所作性異於所作虗空等喻異於瓶等故名異品此中下結成因義言所作性者謂有為法是所作性殷勤勇猛無間所發亦是所作義故遍是宗法者謂上所作性於無常宗為同品於常宗為異品故名遍是宗法於同品定有性異品遍無性者意謂無常為宗則所作性同有異無若常為宗則所作性同無異有同品有故遍於同品異品有故遍於異品故論云無常等者等於常宗結顯此因遍無常宗之同品亦遍常宗之異品故云遍是宗法二釋因竟下三釋喻喻有二種一者同法二者異法同法者若於是處顯因同品決定有性謂若所作見彼無常譬如瓶等異法者若於是處説所立無因遍非有謂若是常見非所作如虗空等此中常言表非無常非所作言表無所作如有非有説名非有一同法者法即宗因宗依名有法宗體但名法因名宗法故宗因俱名法以喻必同同品宗因故名同法二異法者謂異品喻雖同異品之宗因必不同於同品之法故名異法同法者下釋成同喻之義若於是處者即同法喻處也顯因同品者顯能成立之因同於喻也決定有性者謂同法喻中決定有同品之因性謂若下舉例以所作性故之因見彼無常之宗譬如瓶等為喻異法者下釋成異喻是處者即異喻之處説所立無者謂無同品所立之宗因遍非有者謂同品之因於異品中遍非有故復立異品云謂若是常為宗見非所作為因如虗空等為喻此中不釋成異品異於同品之義謂此異品中常宗之言表非同品無常之宗非所作言表無同品所作之因如有下舉例釋成同品異品義謂如有有必有非有言有即同品非有即異品以異品中非有同品之義故説異品名為非有故下論云對彼有論有即同品對非有論即對異品三釋喻竟通上二別釋三支竟下三結成立義已説宗因等如是多言開悟他時説名能立如説聲無常者是立宗言所作性故者是宗法言若是所作見彼無常如瓶等者是隨同品言若是其常見非所作如虗空者是遠離言惟此三分説名能立已説下謂前已立三支無過開曉於人故名能立如説下釋成所立三支名義原於立宗必先有法為宗依故舉聲為前陳推聲之體無常非實有性故立後陳無常為宗是為立宗言也聲有所作理必無常無常之宗法於所作故云所作性故者是宗法言為因也若是所作下舉合詞明同品因明之法合必先能後所離則先所後能故云若是所作者是先舉能成立之因見彼無常者次合所成立之宗然後合喻故如瓶等是隨同品言者結成合詞若是其常下舉離詞明異品離則先所後能故先舉所成立之常宗次陳能成立之非所作因然後舉喻如虗空等謂是遠離言者結成離詞復總結云唯此宗因喻之三分無過説名能立三結成立義竟通上一釋能立門竟下二釋似能立門分四一釋似宗二釋似因三釋似喻四結前科一釋似宗分二一總標帶過唯樂成立由與現量等相違故名似立宗謂現量相違比量相違自教相違世間相違自語相違能別不極成所別不極成俱不極成相符極成雖樂下總標似宗謂現量下明九種帶過一總標帶過竟下二別釋九種此中現量相違者如説聲非所聞一釋現量相違過謂現量者取境清明不帶名言數量猶如鏡面現諸影像非無其像去則無留今立者既説聲塵為有法又立非所聞為宗如説鏡像非鏡面現豈不相違比量相違者如説瓶等是常二釋比量相違過言比量者理門論説為顯所比故説宗言應知立宗於所比義能觀察故名為比量今立者以瓶等為有法定常為宗然常非所作瓶等不成瓶等所作常義非有龍樹云所作非常故常非所作故較之比量相違明如指掌自教相違者如勝論師立聲為常三釋自教相違過外道所計不出四句謂有句無句俱句不俱句勝論計異即是無句今以聲為宗依定常為宗體則常非無句亦非異句故與自教無句異句俱相違也世間相違者如説懷兔非月有故又如説言人頂骨淨衆生分故猶如螺貝四釋世間相違過諸世間人説兔望月踏影成胎今説懷兔非月有故故與世間所説相違又如下復立比量顯與世相違量云人頂骨為宗依立淨為宗體衆生分故為因猶如螺貝為喻世人謂餘尸骸頂骨皆為不淨以從青瘀膀脹爛壞至白骨等皆不淨故今立淨為宗豈不相違如他國中以人頂骨為喇碗及為數珠是此類故自語相違者如言我母是其石女五釋自語相違過為我母者必能生育方有我身若言我母是其石女石女不育我從何生是為自語相違之過能別不極成者如佛弟子對數論師立聲滅壞六釋能別宗體帶過能別者謂能辨別宗依之義立為宗體故説宗體名為能別不極成者以立宗體敵者不許名帶過故原佛弟子立聲滅壞是無常義其理極成但對數論師立便不極成以數論師執一執有為宗俱是常義不許滅壞今以聲為所別有法滅壞為能別宗體彼既不許是不極成以因明之法立敵共許方成宗體苟非其制便為帶過所別不極成者如數論師對佛弟子説我是思七釋所別宗依帶過言所別者是前陳宗依以帶過故名不極成數論師以神我為宗依立思為宗體雖則不違自教對佛弟子便不極成以佛説法一切無我故佛弟子不許有我則所別我為不極成俱不極成者如勝論師對佛弟子立我以為和合因緣八釋能所二俱帶過所言俱不極成者是能別所別二俱帶過為俱不成據佛弟子無我為宗則於所別我上不成以勝論師執異為宗無和合義又執無句即無因緣故於能別和合因緣亦不極成今詳能別所別俱不極成者唯在宗依宗體上説以宗中云此中宗者謂極成有法極成能別應知立宗必得彼此共許無諸過難名為極成若不共許是無圓滿極成就義相符極成者如説聲是所聞九釋相符極成之過言相符者於聲有法立所聞為宗則諸世間及與聖教皆同此義故名相符問若謂相符於理極成何名為過答因明之法立敵共諍是為宗體今既相符無共諍義亦是帶過如是多言是遣諸法自相門故不容成故立無果故名似立宗過結前九種帶過所言遣者是遠離義言自相者是法性義如瓶衣等無常為自相虗空等義常為自相若以瓶衣為常虗空等義又為無常是謂遣諸法自相門故不容成立亦無果以不生智是無果義故名似立宗過二別釋九種竟通上一釋似宗竟下二釋似因分二一結前總標已説似宗當説似因不成不定及與相違是名似因結前已説似宗起後當説似因不成不定及相違者總標三科名似立因下文別釋一結前總標竟下二別釋似因分三一釋不成二釋不定三釋相違且初釋不成不成有四一兩俱不成二隨一不成三猶豫不成四所依不成總分不成有四種過下文一一別釋如成立聲為無常等若言是眼所見性故兩俱不成一釋兩俱不成過立聲為無常等者謂以聲為宗依或立無常及常為宗體若言眼所見性故為因聲非眼家所見彼此共知是故立者敵者俱不許聲為眼所見名俱不成又據龍樹云若有彼此不同許者定非宗法如有成立聲是無常眼所見性故彼謂聲是耳聞云眼所見立敵兩家俱不聽許是故説為兩俱不成所作性故對聲顯論隨一不成二釋隨一不成過謂將所作性故之因對彼聲顯外道論無常義彼不許聲是所作性是為隨一不成之過龍樹云又若敵論不同許者如對顯論所作性故彼以顯字為敵者之名敵者不許聲為所作是故説為隨一不成問此中彼此不許與宗中彼此不許何別答宗中不許通於宗依宗體説為不極成過以立宗時必具極成有法極成能別名為能立若彼不許是不極成此中不許唯在宗法性上説不成過宗法性者是生起因名能成立彼若不許是不能成雖則許與不許彼此皆同而於極成了因及能成生因有差別故龍樹云此中乃言宗者唯取有法或有宗聲唯詮於法宗也此中宗法因也唯取立論及敵論者決定同許何以故今此唯依證了因故因證宗也但由智力了所説義宗也非如生因由能起用因也彼中難云若爾既取智為了因是言便失能成立義彼復答云此亦不然令彼憶念本極成故極成有法極成能別是故此中唯取彼此俱定許義即為善説於霧等性起疑惑時為成大種和合火有而有所説猶豫不成三釋猶豫不成過霧等性者等於煙性霧為水大之種煙為和合火有謂若於霧於煙猶豫不決不能定知諸法本因是似因過以霧等性是宗法性名之為因於因不決故名猶豫不成因之過也虗空實有德所依故對無空論所依不成四釋所依不成過勝論所宗六句義中實句有九空居第五德句義有二十四種謂色香味觸等俱以空為所依故立虗空為有法實有為宗德所依故為因對無空論有不成過以有外道謂色與空質礙是有空性是無不見虗空有往來故彼不許有則德所依空性不成亦是因中之過也一釋不成竟下二釋不定不定有六一共二不共三同品一分轉異品遍轉四異品一分轉同品遍轉五俱品一分轉六相違決定總標不定有六種過下文一一別釋此中共者如言聲常所量性故常無常品皆共此因是故不定為如瓶等所量性故聲是無常為如空等所量性故聲是其常一釋共中因不定過如言聲是有法定常為宗所量性故為因此中標定所立宗因復出過云常無常品皆共此因是故不定以所量性故之因於常宗喻及無常宗喻皆是共故為如下釋成不定義為如瓶等所量性故喻聲有法宗是無常以彼瓶有大小淺深皆所量故為如空等所量性故喻聲有法宗是其常以彼虗空遠近方圓俱可量故是為所量性故之因寬於常無常品中共有為過言不共者如説聲常所聞性故常無常品皆離此因常無常外餘非有故是猶豫因此所聞性其猶何等二釋不共因不定過聲是有法定常為宗所聞性故為因此中標定宗因復顯不定過云常無常品皆離此因謂所聞性於常宗喻及無常喻皆遠離故何則為如瓶等非所聞性喻聲有法宗是無常為如空等非所聞性喻聲有法宗是其常以瓶與空皆眼見故非所聞性是故相離常無常外餘非有故是猶豫因者明不定義此所聞性其猶何等者是明不共義同品一分轉異品遍轉者如説聲非勤勇無間所發無常性故此中非勤勇無間所發宗以電空等為其同品此無常性於電等有於空等無非勤勇無間所發宗以瓶等為異品於彼遍有此因以電以瓶為同法故亦是不定為如瓶等無常性故彼是勤勇無間所發為如電等無常性故彼非勤勇無間所發三釋同品一分轉異品遍轉過如説下標定宗因非勤勇無間所發為宗無常性故為因此中下牒宗引喻此無常下明因於喻一分不轉為過以電無常於因得轉空性是常因非有故非勤勇下復牒同宗引異品喻於彼遍有者顯因與瓶皆是無常是遍轉義此因下顯不定過謂電瓶二喻同是無常法故為如下釋成因喻分轉遍轉明不定義謂瓶等之喻無常是勤勇無間所發合無常性故之因能成異品之宗是勤勇無間所發為如電等之喻無常非勤勇無間所發合無常性故之因能成同品之宗非勤勇無間所發則知無常性故因寬於同品異品為不定過以於異品不當轉處而反遍轉同品盡當轉處唯得一分豈非過耶異品一分轉同品遍轉者如立宗言聲是勤勇無間所發無常性故勤勇無間所發宗以瓶等為同品其無常性於此遍有以電空等為異品於彼一分電等是有空等是無是故如前亦為不定四釋異品一分轉同品遍轉過異品下牒科標舉如立下標定宗因以是勤勇無間所發為宗無常性故為因勤勇無間下牒宗引喻其無常性於此遍有者顯因同品是遍轉義以電空等下引異品喻顯不定過謂無常性故之因會於電等是無常性故説是有會於空等是常性故説彼是無是故如前以電以瓶為同法故亦為不定以不當於異品一分電上轉故俱品一分轉者如説聲常無質礙故此中常宗以虗空極微等為同品無質礙性於虗空等有於極微等無以瓶樂等為異品於樂等有於瓶等無是故此因以樂以空為同法故亦名不定五釋俱品一分轉過言俱品者謂因於同品異品各有一分轉如説聲常無質礙故者標定宗因以常為宗無質礙為因此中下牒宗引喻以立常宗虗空性常極微亦常宜為同品無質礙下釋成同品一分轉義謂無質礙故之因空無質礙故説為有極微質礙説之為無以瓶樂等為異品者瓶等無常苦樂亦非常宜於同品所立常宗為異品喻於樂等有於瓶等無者釋成異品一分轉義謂無質礙故之因樂無質礙故説為有瓶有質礙説之為無是故下結成不定相違決定者如立宗言聲是無常所作性故譬如瓶等有立聲常所聞性故譬如聲性此二皆是猶豫因故俱名不定六釋相違決定過言相違決定者即決定相違也語出譯師詞倒意順故宗鏡釋云夫決定相違不定過立敵共諍一有法因喻各異皆具三相遍是宗法性同品定有性異品遍無性但互不生其正智兩家猶豫不能定成一宗名決定相違不定過如立下標定三支有立下復立三支此二下顯不定過言相違者常與無常是相違義既二相違互為同異常宗為同無常為異無常為同常宗為異言決定者以立二宗各具三支皆具三相是為決定謂同品之因遍於同品異品之因遍於異品為遍是宗法性同品之因不轉異品是於同品定有性異品之因不轉同品是於異品遍無性雖則兩宗並出然於一有法上不能決定説之為過二釋不定竟下三釋相違相違有四謂法自相相違因法差別相違因有法自相相違因有法差別相違因等總標相違有四種過下文一一別釋此中法自相相違因者如説聲常所作性故或勤勇無間所發性故此因唯於異品中有是故相違一釋法自相相違因過言法自相者謂諸法各有自相即是所立宗體言相違者謂因與宗相違如説勤勇無間所發性故豈成非所作之常宗如説下標定宗因以常為宗所作性故或勤勇無間所發性故為因此因下牒因顯過謂宗是常性非所作則所作性故之因唯於異品無常中有是故相違以諸無常所作性故法差別相違因者如説眼等必為他用積聚性故如臥具等此因如能成立眼等必為他用如是亦能成立所立法差別相違積聚他用諸臥具等為積聚他所受用故二釋法差別相違因過言法差別相違因者是諸法中有差別義因不能成説為相違如説下標定三支謂眼等五根為有法必為他用為宗積聚性故為因如臥具等為喻以眼等根不自用故必眼等識以為根用故立宗言必為他用又眼等根元為地水火風色香味觸八法所成是積聚義故以積聚性故為因以臥具等衆緣所成亦必為他用故説為喻此因下牒因成宗如是下顯法差別相違因過余觀諸家解此章意俱引金七十論為證彼此語勢含胡發明未透令學者視此不爽今以三分之理明之其意似暢試更言之法差別者為眼等根作前陳有法推根之義有差別故所立之法亦有差別根是相分為眼等識之所依識是見分為眼等根之所發相見各異故説眼自積聚必為他識所用即立宗云必為他用又相見分為自證分之用其自證分為相見分之體體持業用用不為他復立宗云必不為他用故以眼等根名有法自相必為他用必不為他用名法之差別今之積聚性故因會於如臥具等喻但成必為他用宗不得成必不為他用宗是因與差別宗相違故論中云此因如能成立眼等必為他用者縱許成立宗中一分義如是亦能成立所立法差別者顯宗中亦有差別一分義於因亦當能成立但以必不為他用宗會積聚之因他用之宗俱相違故故云相違積聚他用又云諸臥具等為積聚他所受用故者釋成因喻俱為他用故於宗中差別一分必不為他用相違有法自相相違因者如説有性非實非德非業有一實故有德業故如同異性此因如能成遮實等如是亦能成遮有性俱決定故三釋有法自相相違因過有法自相者即前陳宗依之自相言相違者因不能成有法自相故説相違原於勝論師計六句義第四句為大有句實德業三同一有故離實德業外別有一法為體由此大有有實等故今言有性即彼大有句義如説下標定三支以大有性為前陳宗依由此有性離實德業別有實體故説非實非德非業為宗又此有性元為實德業三同一有故故説有一實故有德業故為因又此有性有實德業為同非實德業為異故説如同異性為喻此因下牒因成宗顯相違過謂有一實等因成非實等宗豈不互相遮止故云遮實等之非實等宗如是下顯因展轉與有法自相相違謂有一實等因既遮非實等宗則有法中亦有非實等義豈不亦遮故云如是亦能成遮有性中之非實等俱決定故者謂宗及有法與因相違俱決定故有法差別相違因者如即此因即於前宗有法差別作有緣性亦能成立與此相違作非有緣性如遮實等俱決定故四釋有法差別相違因過言有法差別者謂前陳宗依有差別義言相違者因不能成差別義故如即下牒因成有法即此因者即前有一實等因即於前宗有法差別者即前大有性中非實德業有實德業之差別作有緣性者以有一實等因成有實等有性謂之有緣亦能下釋成相違義謂有一實等因既能成立有法中有實等一分亦能成立與此有實等相違非實等一分以有一實等因成非實等之有法是作非有緣性既非有緣則有一實等因不能成有法中非實等亦不能成有法中有實等故云如遮實等俱決定故謂前章宗及有法俱遮則此有法中差別二義亦爾三釋相違竟通上二釋似因竟下三釋似喻分二一結前總標已説似因當説似喻似同法喻有其五種一能立法不成二所立法不成三俱不成四無合五倒合似異法喻亦有五種一所立不遣二能立不遣三俱不遣四不離五倒離結前已説似因起後當説似喻似同法喻似異法喻各有五過名為似喻下文別釋一結前總標竟下二別釋同異分二一同喻五種能立法不成者如説聲常無質礙故諸無質礙見彼是常猶如極微然彼極微所成立法常性是有能成立法無質礙無以諸極微質礙性故一釋似同法喻中能立不成過因是能成立法喻於因上不轉故曰不成如説下標定宗因以常為宗無質礙故為因諸無下牒因及宗引喻合成然彼下牒喻顯過謂極微性常於所成立宗常性是有極微質礙於能成立因無質礙無故云以諸極微質礙性故所立法不成者謂説如覺然一切覺能成立法無質礙有所成立法常住性無以一切覺皆無常故二釋似同法喻中所立不成過宗是所成立法喻於宗上不轉故曰不成謂説如覺者引喻合前宗因謂以常為宗無質礙為因如覺為喻然一切下牒喻顯過一切覺者即有分別生滅心也覺性無礙於能成立因無質礙有覺性無常於所成立宗常性是無故云以一切覺皆無常故俱不成者復有二種有及非有若言如瓶有俱不成若説如空對非有論無俱不成三釋似同法喻中能所俱不成過謂喻於宗因上俱不能轉名俱不成復有二種有及非有者分開同品異品兩章以有名同品非有名異品即前能立門中云如有非有説名非有文出於此若言如瓶者引喻合前同品宗因有俱不成者顯過謂瓶體無常會前同品常宗不成瓶有質礙會前無質礙因不成有即同品故云有俱不成以瓶等之喻於同品宗因俱不成故若説如空對非有論者引喻合異品宗因以前同品常宗異品應無常宗同品之因是無質礙異品之因為有質礙説如空者空性是常不成異品無常之宗空性無礙不成異品有礙之因非有即無無即異品故云無俱不成以如空之喻於異品宗因俱不成故無合者謂於是處無有配合但於瓶等雙現能立所立二法如言於瓶見所作性及無常性四釋似同法喻中無有合詞過謂於下標定具三支義如言下明無合詞顯過謂立量之法雖有三支必具合離二詞以為同異之式合必先因後宗離則先宗後因以因為能成立法故先之宗是所成立法故次之喻為宗因之明訓故又次之今同品中雖具瓶等為喻所作性故為因及無常性為宗而無合詞之式是為有過倒合者謂應説言諸所作者皆是無常而倒説言諸無常者皆是所作五釋似同法喻中倒置合詞過謂應下正顯合詞而倒下顯倒合之過如是名似同法喻品結成似同法喻中五種過一同喻五種竟下二異喻五種似異法中所立不遣者且如有言諸無常者見彼質礙譬如極微由於極微所成立法常性不遣彼立極微是常性故能成立法無質礙無一釋似異法喻中所立不遣過遣者是遠離義謂異品喻必遠離於同品宗因是為異喻體今既不遣説之為過且如下標定離詞離則先宗後因故以無常宗先之質礙因次之極微喻又次之由於下牒喻顯過謂極微性常於前同品所成立法常宗不遣故云彼立極微是常性故極微質礙能遣同品無質礙因故云無質礙無無即遣義能立不遣者謂説如業但遣所立不遣能立彼説諸業無質礙故二釋似異法喻中能立不遣過謂説如業者引喻會同品宗因顯過業性無常於前同品所立常宗有遠離義故云但遣所立業性無礙於同品中無質礙因相順故云不遣能立俱不遣者對彼有論説如虗空由彼虗空不遣常性無質礙性以説虗空是常性故無質礙故三釋似異法喻中能所俱不遣過俱不遣者謂異品喻與同品中宗因相順名俱不遣對彼有論説如虗空者有即同品對前同品宗因引喻配合由彼下顯過謂空性是常不遣同品常性之宗空性無礙不遣同品無礙之因故云以説虗空是常性故無質礙故不離者謂説如瓶見無常性有質礙性四釋似異法喻中無離詞過立量之法合成同品必有離詞顯異品式今者但有異品三支之名闕於離詞不合軌式説之為過倒離者謂如説言諸質礙者皆是無常五釋似異法喻中倒置離詞過因明之法離則先宗後因今以因先宗後是為倒置説之為過二異喻五種竟通上三釋似喻竟下四結前科如是等似宗因喻言非正能立通結前來似宗似因似喻之言共成三十三過故云非正能立四結前科竟通上二釋似能立門竟下三釋現量門復次為自開悟當知唯有現比二量此中現量謂無分別若有正智於色等義離名種等所有分別現現別轉故名現量復次下雙標二量者以現比量俱是自證自解境界故云為自開悟此中現量謂無分別者標定現量是不起分別義若有下釋成謂正智起時於色聲香味觸邊不起名言種子所有分別而能於五塵上現現別轉故名現量名言種者是習所成明記不忘念念熏習成種子義如孩孺時眼見於色人言為色積習於心耳聞於聲人言為聲積習於心日積月纍熏成種子後於聲色門中從種發起聲色名言謂之名種今説離名種等所有分別而又言現現別轉者是於聲色門中無分別義如鏡現像歷歷分明是於五塵現現別轉鏡無留礙是離名種所有分別三釋現量門竟下四釋比量門言比量者謂藉衆相而觀於義相有三種如前已説由彼為因於所比義有正智生了知有火或無常等是名比量於二量中即智名果是證相故如有作用而顯現故亦名為量言比量者牒科標舉謂藉衆相而觀於義者釋比量二字衆相釋比觀義釋量相有下釋成衆相言三種者即宗因喻如前已説者能立門中已説三支問此中三相與因中何異答因中三相唯屬於因與宗為因名能成立此中三相總攝三支與智為因名為比量是故不同由彼下釋比量謂由無過三支為因比之生智為果故云於所比義有正智生正智既生了知有火或無常等是比量義於二量中即智名果者謂現比量皆以生智為果比量以三支為因生有分別正智為果能證所比義故現量以色等為因生無分別正智為果能證色等自相故云是證相故如有作用而顯現故亦名為量者別明世𡛇等量謂遷流作用顯現世量塵點作用顯現數量質礙作用顯現色量頑虗作用顯現空量屈曲作用顯現形量光明作用顯現影量如是等量皆以作用而顯現故四釋比量門竟下五釋似現量門有分別智於義異轉名似現量謂諸有智了瓶衣等分別而生由彼於義不以自相為境界故名似現量智有分別於諸法中不證自相隨起名言名為異轉由不了知無常等義又非比量但於見聞隨起名言種子所有分別名似現量故釋云謂諸有智了瓶衣等分別而生何以故由彼於義不以自相為境界故五釋似現量門竟下六釋似比量門若似因智為先所起諸似義智名似比量似因多種如先已説用彼為因於似所比諸有智生不能正解名似比量似因智者因是比量謂似比量所生之智名似因智為先所起諸似義智名似比量者即前帶過三支於諸義中似有所知不能正了無常等義但名相似比量似因多種下釋成謂前已説三十三過名為多種即是多言用彼多過為因於所比義雖有智生不能正解故説名似六釋似比量門竟下七釋能破門復次若顯示能立過失説名能破謂初能立缺減過性立宗過性不成因性不定因性相違因性及喻過性顯示此言開曉問者故名能破能立門中若有過失正能顯示是能破義謂初下釋成顯過初能立者即是前陳宗依依彼有法宗可立故若得圓滿成就謂之有法極成稍有缺減説之為過立宗過者即前九種因不成者即前四種因不定者即前六種因相違者即前四種喻有過者即前十種若能顯示三十三種過言開曉問者故名能破七釋能破門竟下八釋似能破門若不實顯能立過言名似能破謂於圓滿能立顯示缺減性言於無過宗有過宗言於成就因不成因言於決定因不定因言於不相違因相違因言於無過喻有過喻言如是言説名似能破以不能顯他宗過失彼無過故且止斯事似能破門容有二義若能立門自帶有過敵者不能正顯其非是似能破以不能顯他宗過故若能立門本無有過岡冒於他亦非真破以彼無過且止斯事餘義如文詞不繁贅八釋似能破門竟通上二通釋竟下三結顯已宣少句義為始立方隅其間理非理妙辨在餘處謂已宣演微少句義為始立一隅擴充之則六合皆然苟得其旨於聲色門不唯了知常無常義亦有親證實相者在其間理者即前無過三支言非理者即前三十三過餘處妙辨皆是此中理非理義故以少句立方隅也三結顯竟
