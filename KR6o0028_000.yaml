body:
  text: 因明入正理論直疏敘夫三相立因徹諸法之本因五聲定理入諸法之正理故三支無過宗藉能所以肇因多理極成喻假異同而生果若能立俱真能破俱偽雖秦儀之辨莫能斥其非盧駱之文莫能飾其過繇是毀呰魔外鐵鍱以是而偃伏導引天人金輪以是而依崇所謂言生智了正顯邪摧自悟悟他靡越于此故於曲女城中立唯識量十有八日列國群賢無敢譸議詎非因明證真之力歟原其茲論自奘師始譯永明繼陳漸爾鮮聞邈焉垂絶高原大師遠續餘光志興厥旨慨其義趣隱微初學臨文難曉以質直詞疏通蹊徑令諸覽者眼底無全牛矣余企慕斯文慶逢法席愧無所諳為師鼓吹冀諸同志無泯斯因萬曆歲次壬子端陽前二日武林後學大善和南書於南屏山中
